<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Fallbakit logo</title>
  <desc id="desc">Square Fallbakit logo mark with a local-first branching route in the green brand color.</desc>
  <defs>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.843 0 0 0 0 0.894 0 0 0 0 0.016 0 0 0 0.55 0" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="56" fill="#0e0f05" />
  <rect x="44" y="44" width="424" height="424" rx="38" fill="#131408" stroke="#474833" stroke-width="4" />
  <path d="M44 150h424M44 256h424M44 362h424M150 44v424M256 44v424M362 44v424" stroke="#d7e404" stroke-opacity="0.07" stroke-width="2" />

  <g filter="url(#softGlow)">
    <path d="M122 256h118c78 0 92-96 180-96" fill="none" stroke="#d7e404" stroke-width="36" stroke-linecap="round" />
    <path d="M240 256c72 0 90 96 180 96" fill="none" stroke="#d7e404" stroke-width="36" stroke-linecap="round" stroke-opacity="0.92" />
  </g>

  <circle cx="122" cy="256" r="42" fill="#d7e404" />
  <circle cx="420" cy="160" r="34" fill="#d7e404" />
  <circle cx="420" cy="352" r="34" fill="#d7e404" />
  <circle cx="122" cy="256" r="16" fill="#303300" fill-opacity="0.85" />
  <circle cx="420" cy="160" r="13" fill="#303300" fill-opacity="0.85" />
  <circle cx="420" cy="352" r="13" fill="#303300" fill-opacity="0.85" />
  <path d="M104 118h88M104 394h88" stroke="#e5e3cf" stroke-opacity="0.32" stroke-width="12" stroke-linecap="round" />
</svg>
